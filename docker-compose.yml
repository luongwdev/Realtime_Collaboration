version: "3.9"

# Chỉ dùng image từ Docker Hub (CI push). Trên server: docker compose pull && docker compose up -d
# Copy env.example → .env (JWT, Google, FRONTEND_URL, …).

services:
  postgres:
    image: postgres:16-alpine
    container_name: teamflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamflow
      POSTGRES_USER: admintf
      POSTGRES_PASSWORD: 123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admintf -d teamflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKER_USERNAME:-ducluong610}/teamflow-backend:latest
    container_name: teamflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admintf:123456@postgres:5432/teamflow?schema=public
      PORT: 4321
      FRONTEND_URL: ${FRONTEND_URL:-https://ducluong06.dpdns.org}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://api.ducluong06.dpdns.org/auth/google/callback}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4321:4321"

  frontend:
    image: ${DOCKER_USERNAME:-ducluong610}/teamflow-frontend:latest
    container_name: teamflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3456:3456"

volumes:
  postgres_data:

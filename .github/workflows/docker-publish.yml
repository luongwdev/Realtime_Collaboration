name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: teamflow-backend
  FRONTEND_IMAGE_NAME: teamflow-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===== Resolve FE URL =====
      - name: Resolve NEXT_PUBLIC_API_URL
        id: fe_url
        run: |
          URL='${{ vars.NEXT_PUBLIC_API_URL }}'
          if [ -z "$URL" ]; then URL='http://localhost:4321'; fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      # ===== Docker setup =====
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ===== Backend =====
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===== Frontend =====
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.fe_url.outputs.url }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/Realtime_Collaboration

            echo "Pull latest images..."
            docker-compose pull

            echo "Restart containers..."
            docker-compose down
            docker-compose up -d

            echo "Clean old images..."
            docker image prune -f

            echo "Check status..."
            docker-compose ps
